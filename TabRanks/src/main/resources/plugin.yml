name: TabRanks
version: 1.0.0
main: nl.tabranks.plugin.TabRanks
api-version: 1.20
author: TabRanks
description: Mooie TABlist met rollen en gekleurde namen

commands:
  rank:
    description: Stel de rang van een speler in
    usage: /rank <speler> <rang>
    permission: tabranks.admin
  rankinfo:
    description: Bekijk jouw eigen rang
    usage: /rankinfo
  ranklist:
    description: Bekijk alle beschikbare rangen
    usage: /ranklist

permissions:
  tabranks.admin:
    description: Rangen instellen bij andere spelers
    default: op
  tabranks.rank.owner:
    description: Owner rang
    default: false
  tabranks.rank.admin:
    description: Admin rang
    default: false
  tabranks.rank.moderator:
    description: Moderator rang
    default: false
  tabranks.rank.developer:
    description: Developer rang
    default: false
  tabranks.rank.streamer:
    description: Streamer rang
    default: false
  tabranks.rank.youtuber:
    description: YouTuber rang
    default: false
  tabranks.rank.vip_plus:
    description: VIP+ rang
    default: false
  tabranks.rank.vip:
    description: VIP rang
    default: false
  tabranks.rank.mvp:
    description: MVP rang
    default: false
  tabranks.rank.helper:
    description: Helper rang
    default: false
  tabranks.rank.builder:
    description: Builder rang
    default: false
  tabranks.rank.player:
    description: Standaard speler rang
    default: true
